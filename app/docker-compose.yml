services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: vnrate-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-vnrate_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vnrate_password}
      - POSTGRES_DB=${POSTGRES_DB:-vnrate_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net
    restart: unless-stopped

  # FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: vnrate-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://${POSTGRES_USER:-vnrate_user}:${POSTGRES_PASSWORD:-vnrate_password}@db:5432/${POSTGRES_DB:-vnrate_db}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/ready')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s    # Allow time for model training at startup
    networks:
      - app_net
    restart: unless-stopped

  # Next.js frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: vnrate-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_INTERNAL_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app_net:
    driver: bridge
